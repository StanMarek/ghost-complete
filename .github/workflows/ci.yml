name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  msrv:
    name: MSRV (1.86)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  # Linux tripwire: macOS is the primary target, but we compile-check on Linux
  # so PRs can't land code that uses macOS-only APIs without review. Not a
  # full test run — just `cargo check --workspace --all-targets`.
  linux-tripwire:
    name: Linux tripwire (compile-check only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  binary-size-gate:
    name: Binary size gate
    needs: [check]
    runs-on: macos-latest
    env:
      PHASE_BUDGET: 2MB
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      # Ceiling raised from 30MB to 110MB in ux-8 to admit the AWS spec.
      # The actual restored-AWS binary is ~102 MB (the SPEC predicted ~40 MB
      # but undercounted: the 418 inlined sub-specs carry ~28 MB of upstream
      # description text, which `include_str!` doubles in __const data).
      # zstd-compressing the embedded specs (separate plan) is the principled
      # reclaim path; this ceiling is the honest measurement plus ~8% headroom.
      - name: Absolute ceiling (110MB)
        run: scripts/check-binary-size.sh --absolute-max 110MB
      - name: Per-phase delta budget
        run: scripts/check-binary-size.sh --delta-max "$PHASE_BUDGET"

  snapshot-diff-gate:
    name: Snapshot diff gate
    needs: [check, binary-size-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Diff specs/__snapshots__
        run: scripts/check-snapshots.sh

  oracle-gate:
    name: Oracle gate (fig-converter)
    needs: [check]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            fig_converter:
              - 'tools/fig-converter/**'
            spec_priority_audit:
              - 'tools/spec-priority-audit/**'
      - name: Set up Node
        if: steps.filter.outputs.fig_converter == 'true' || steps.filter.outputs.spec_priority_audit == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install fig-converter dependencies
        if: steps.filter.outputs.fig_converter == 'true'
        run: npm ci
        working-directory: tools/fig-converter
      - name: Run oracle stub
        if: steps.filter.outputs.fig_converter == 'true'
        run: npm run oracle:changed
        working-directory: tools/fig-converter
      - name: Run spec-priority-audit tests
        if: steps.filter.outputs.spec_priority_audit == 'true'
        run: node --test apply.test.mjs
        working-directory: tools/spec-priority-audit

  coverage-baseline-drift:
    name: Coverage baseline drift
    # Informational, non-blocking gate. Only runs on main/master branches
    # (pushes to master, or PRs targeting master/main) — feature branches
    # are skipped to keep the signal tied to what's landing on trunk.
    if: github.ref == 'refs/heads/master' || github.base_ref == 'master' || github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check coverage baseline drift
        run: scripts/check-coverage-baseline-drift.sh
