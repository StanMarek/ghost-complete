name: Bug Report
description: Report a bug in Ghost Complete
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open Ghostty
        2. Type `git ch`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Ghost Complete version
      description: Output of `ghost-complete --version`
      placeholder: "ghost-complete 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: terminal
    attributes:
      label: Terminal
      options:
        - Ghostty
        - Other (please specify in description)
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - zsh
        - bash
        - fish
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS version
      placeholder: "macOS 15.3"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant log output. Run with `ghost-complete --log-level debug` to capture debug logs.
      render: text
